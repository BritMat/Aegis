<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
    <title>BM-Aegis</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>

    <!-- ── Title Bar ───────────────────────────────────────────────── -->
    <div id="title-bar" data-tauri-drag-region>
      <div class="title-bar-left">
        <div class="logo-lockup">
          <div class="logo-icon-wrap">
            <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 7L5 4L8 7L11 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M2 10L5 7L8 10L11 7" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
            </svg>
          </div>
          <span class="title-text">BM-AEGIS</span>
          <span class="title-version">v0.1.0</span>
        </div>
      </div>
      <div class="title-bar-right">
        <button class="titlebar-btn" id="btn-minimize" title="Minimise">
          <svg width="10" height="2" viewBox="0 0 10 2" fill="currentColor"><rect width="10" height="2" rx="1"/></svg>
        </button>
        <button class="titlebar-btn" id="btn-maximize" title="Maximise">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <rect x="1" y="1" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
        <button class="titlebar-btn danger" id="btn-close" title="Close">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ── Tab Bar ──────────────────────────────────────────────────── -->
    <nav id="tab-bar">
      <button class="tab active" data-tab="editor">
        <svg class="tab-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
          <rect x="1" y="1" width="11" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M3.5 5L6 7.5L3.5 10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M7 10h2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        Editor
      </button>
      <button class="tab" data-tab="browser">
        <svg class="tab-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
          <circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M6.5 1c0 0-2.5 2-2.5 5.5S6.5 12 6.5 12" stroke="currentColor" stroke-width="1"/>
          <path d="M1 6.5h11" stroke="currentColor" stroke-width="1"/>
          <path d="M2 4h9M2 9h9" stroke="currentColor" stroke-width=".8"/>
        </svg>
        Browser
      </button>
      <button class="tab" data-tab="search">
        <svg class="tab-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
          <circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.3"/>
          <path d="M8.5 8.5L12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Search
      </button>
      <button class="tab" data-tab="settings">
        <svg class="tab-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
          <circle cx="6.5" cy="6.5" r="2" stroke="currentColor" stroke-width="1.3"/>
          <path d="M6.5 1v1.5M6.5 10.5V12M1 6.5h1.5M10.5 6.5H12M2.8 2.8l1 1M9.2 9.2l1 1M9.2 2.8l-1 1M3.8 9.2l-1 1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        Settings
      </button>
    </nav>

    <!-- ── Workspace ────────────────────────────────────────────────── -->
    <div id="workspace">
      <aside id="sidebar"></aside>
      <main id="content-area">
        <div id="panel-editor"   class="panel active"></div>
        <div id="panel-browser"  class="panel"></div>
        <div id="panel-search"   class="panel"></div>
        <div id="panel-settings" class="panel"></div>
      </main>
    </div>

    <!-- ── Status Bar ───────────────────────────────────────────────── -->
    <footer id="status-bar">
      <div class="status-item">
        <div class="status-dot live" id="status-indicator"></div>
        <span id="status-pos">Ln 1, Col 1</span>
      </div>
      <div class="status-item">
        <span class="status-lang" id="status-lang">HTML</span>
      </div>
      <div class="status-item">
        <div class="status-dot ok" id="status-lint-dot"></div>
        <span id="status-lint">Lint: OK</span>
      </div>
      <div class="status-item" style="flex:1; justify-content:flex-end; border-right:none;">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
          <rect x="1" y="2" width="9" height="7" rx="1" stroke="currentColor" stroke-width="1"/>
          <path d="M1 4.5h9" stroke="currentColor" stroke-width=".8"/>
          <path d="M3 2V1M8 2V1" stroke="currentColor" stroke-width=".8"/>
        </svg>
        <span id="status-file" class="mono">No file open</span>
      </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
