name: Build & Release

on:
  push:
    branches: [main]
    tags:     ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Lint & test (fast — runs on all PRs)
  # ─────────────────────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test (Rust)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # System deps needed to compile tauri on Linux (CI only)
      - name: Install Linux system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Rustfmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  # ─────────────────────────────────────────────────────────────────────────
  # Build installers (only on push to main or version tags)
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.platform }}
    needs: lint-and-test
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows x64 (primary target) ────────────────────────────────
          - platform: windows-latest
            target:   x86_64-pc-windows-msvc
            label:    win-x64
          # ── Windows x86 (32-bit compatibility for older systems) ─────────
          - platform: windows-latest
            target:   i686-pc-windows-msvc
            label:    win-x86
          # ── macOS arm64 ─────────────────────────────────────────────────
          - platform: macos-latest
            target:   aarch64-apple-darwin
            label:    macos-arm64
          # ── macOS x86_64 ────────────────────────────────────────────────
          - platform: macos-13
            target:   x86_64-apple-darwin
            label:    macos-x64
          # ── Linux x64 ───────────────────────────────────────────────────
          - platform: ubuntu-22.04
            target:   x86_64-unknown-linux-gnu
            label:    linux-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # ── Rust ──────────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.label }}

      # ── Node ──────────────────────────────────────────────────────────
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps
        run: npm ci

      # ── Linux system deps ────────────────────────────────────────────
      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── macOS sign config ────────────────────────────────────────────
      - name: Import macOS certificates
        if: startsWith(matrix.platform, 'macos')
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64:    ${{ secrets.APPLE_CERTIFICATE }}
          p12-password:       ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        continue-on-error: true  # skip if secrets not configured

      # ── Tauri build ──────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:              ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID:                  ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:            ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:             ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName:     ${{ github.ref_name }}
          releaseName: "BM-Aegis ${{ github.ref_name }}"
          releaseBody: |
            ## BM-Aegis Release

            ### What's included
            - Offline HTML editor with Rust stack-based tokenizer
            - Context-aware HTML5 autocomplete (300+ completions)
            - Privacy browser with Tampermonkey-compatible userscript engine
            - Local SQLite FTS5 search index
            - Privacy metasearch (DuckDuckGo, tracker-stripped)

            See [CHANGELOG.md](CHANGELOG.md) for details.
          releaseDraft:     true
          prerelease:       ${{ !startsWith(github.ref, 'refs/tags/') }}
          args:             --target ${{ matrix.target }}

      # ── Upload artifacts ─────────────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bm-aegis-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
          if-no-files-found: ignore
          retention-days: 14
