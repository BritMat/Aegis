name: Build & Release

on:
  push:
    branches: [main]
    tags:     ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE:   1

jobs:
  # ── Check: fast gate on every PR ─────────────────────────────────────────
  check:
    name: Cargo check & test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      # cargo check catches real type/borrow errors without full compilation
      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets

      # clippy is advisory — warnings don't fail the build
      # Fix warnings incrementally; they are visible in the PR review
      - name: Clippy (advisory)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets
        continue-on-error: true

      # Unit tests must pass
      - name: Unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  # ── Build: full installers on push to main or tag ────────────────────────
  build:
    name: Build — ${{ matrix.label }}
    needs: check
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target:   x86_64-pc-windows-msvc
            label:    win-x64
          - platform: windows-latest
            target:   i686-pc-windows-msvc
            label:    win-x86
          - platform: macos-latest
            target:   aarch64-apple-darwin
            label:    macos-arm64
          - platform: macos-13
            target:   x86_64-apple-darwin
            label:    macos-x64
          - platform: ubuntu-22.04
            target:   x86_64-unknown-linux-gnu
            label:    linux-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.label }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName:      ${{ github.ref_name }}
          releaseName:  "BM-Aegis ${{ github.ref_name }}"
          releaseDraft: true
          prerelease:   ${{ !startsWith(github.ref, 'refs/tags/') }}
          args:         --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bm-aegis-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
          if-no-files-found: ignore
          retention-days: 14
